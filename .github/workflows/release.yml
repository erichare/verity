name: Release

# Publishes the verity-x3p codec on version tags (v0.2.0, v1.0.0, ...):
#   - Python wheels (manylinux x86_64/aarch64, macOS x86_64/arm64, Windows x64)
#     + sdist -> PyPI via trusted publishing (OIDC, no long-lived token).
#   - The verity-x3p crate -> crates.io (needs the CARGO_REGISTRY_TOKEN secret).
#
# One-time setup before the first tagged release:
#   PyPI: add a "trusted publisher" for the `verity-x3p` project at
#     https://pypi.org/manage/account/publishing/ with
#     owner=erichare, repository=verity, workflow=release.yml (no environment).
#     Until that is configured, the publish-pypi job will fail at the upload step.
#   crates.io: create an API token at https://crates.io/settings/tokens
#     (scope: publish-new + publish-update) and save it as the repo secret
#     CARGO_REGISTRY_TOKEN (Settings -> Secrets and variables -> Actions).
#     If the secret is absent the crates.io job skips cleanly.
#
# Cutting a release: bump versions (root Cargo.toml [workspace.package],
# bindings/python/{Cargo.toml,pyproject.toml}), update CHANGELOG.md, then
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  wheels-linux:
    name: wheels (manylinux ${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: bindings/python/dist

  wheels-macos:
    name: wheels (macOS ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          # GitHub retired the macos-13 image (last free Intel runner) in
          # Dec 2025; x86_64 wheels are cross-compiled from arm64 instead.
          # maturin-action installs the x86_64-apple-darwin Rust target.
          - { runner: macos-14, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: bindings/python/dist

  wheels-windows:
    name: wheels (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: x64
          args: --release --out dist
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: bindings/python/dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/python/dist

  publish-pypi:
    name: publish PyPI (verity-x3p)
    needs: [wheels-linux, wheels-macos, wheels-windows, sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Trusted publishing: PyPI trusts the OIDC token this job mints, so no
      # PyPI API token ever lives in repo secrets. Requires the one-time
      # trusted-publisher setup described at the top of this file.
      id-token: write
    steps:
      # No `name`/`pattern`: every artifact this workflow uploads (wheels +
      # sdist) belongs in the release, so download them all into dist/.
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-crate:
    name: publish crates.io (verity-x3p)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        # Gated on the CARGO_REGISTRY_TOKEN secret (see setup notes at the top
        # of this file). The secrets context is not allowed in job-level `if`,
        # so gate inside the step: absent secret -> skip without failing.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN is not set; skipping crates.io publish."
            echo "Create a token at https://crates.io/settings/tokens and add it as a repo secret named CARGO_REGISTRY_TOKEN."
            exit 0
          fi
          # Idempotency guard: when a release run is re-triggered after a
          # partial failure elsewhere (e.g. a wheel job), this version may
          # already be on crates.io. Publishing a duplicate is a hard error,
          # so skip instead. If the pre-check request itself fails, fall
          # through to cargo publish, which enforces the same rule.
          # The sparse index (what cargo itself resolves against) allows
          # anonymous automated access; the crates.io REST API 403s generic
          # user agents.
          version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "verity-x3p") | .version')
          if curl -fsS "https://index.crates.io/ve/ri/verity-x3p" \
            | jq -e --arg v "$version" 'select(.vers == $v)' >/dev/null 2>&1; then
            echo "::notice::verity-x3p $version is already on crates.io; skipping publish."
            exit 0
          fi
          cargo publish --package verity-x3p
