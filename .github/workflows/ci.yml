name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test

  python:
    name: python (${{ matrix.service }})
    runs-on: ubuntu-latest
    # The api suite's toolmark compare pays a cold 1000-replicate bootstrap
    # ensemble build (memoized only in-memory) — minutes on a 2-core runner.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: engine
            extras: "--extra dev"
          - service: api
            extras: "--extra dev"
          - service: catalog
            extras: "--extra dev --extra api --extra ingest --extra s3"
          - service: mcp
            extras: "--extra dev"
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      # The services depend on ../engine and ../../bindings/python (PyO3) via
      # [tool.uv.sources], so building the env needs a Rust toolchain.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/python
          shared-key: python-${{ matrix.service }}
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: ruff
        run: uv run ${{ matrix.extras }} ruff check .
      - name: pytest
        # CI runners are slower than dev machines; give CPU-bound comparisons
        # more wall-clock than the 60s production default.
        env:
          VERITY_COMPARE_TIMEOUT_S: "900"
        run: uv run ${{ matrix.extras }} pytest

  bindings-python:
    name: bindings-python (PyO3)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/python
          shared-key: bindings-python
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: pytest
        run: uv run --with pytest pytest tests

  web:
    name: web (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/web/pnpm-lock.yaml
      - name: install
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm typecheck
