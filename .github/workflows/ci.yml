name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test

  python:
    name: python (${{ matrix.service }})
    runs-on: ubuntu-latest
    # The api suite's compares build bootstrap calibration ensembles; CI runs
    # 150 replicates (VERITY_LR_BOOTSTRAP_N) and persists them across runs
    # (VERITY_ENSEMBLE_CACHE_DIR + actions/cache), so the cold toolmark build
    # that used to take minutes on a 2-core runner is paid rarely and small.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: engine
            extras: "--extra dev"
          - service: api
            extras: "--extra dev"
          - service: catalog
            extras: "--extra dev --extra api --extra ingest --extra s3"
          - service: mcp
            extras: "--extra dev"
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      # The services depend on ../engine and ../../bindings/python (PyO3) via
      # [tool.uv.sources], so building the env needs a Rust toolchain.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/python
          shared-key: python-${{ matrix.service }}
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: ruff
        run: uv run ${{ matrix.extras }} ruff check .
      # Fitted bootstrap ensembles are content-keyed on disk (reference contents +
      # method/bound/n_boot/seed/clusters), so restoring a stale cache is safe:
      # outdated entries just miss and get refit. restore-keys keeps partial reuse
      # when the bundled references change.
      - name: restore bootstrap-ensemble cache
        if: matrix.service == 'api'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.verity-ensemble-cache
          key: verity-ensembles-${{ hashFiles('services/api/verity_api/references/**') }}-n150
          restore-keys: |
            verity-ensembles-
      - name: pytest
        # CI runners are slower than dev machines; give CPU-bound comparisons
        # more wall-clock than the 60s production default. 150 bootstrap
        # replicates (vs the 1000 production default) keeps a cold clustered
        # ensemble build under ~a minute; n_boot rides in the recipe params, so
        # CI recipe handles (correctly) differ from production's. Tests that pin
        # knob behavior delenv these first, so the job-level env doesn't leak in.
        env:
          VERITY_COMPARE_TIMEOUT_S: "300"
          VERITY_LR_BOOTSTRAP_N: "150"
          VERITY_ENSEMBLE_CACHE_DIR: ${{ github.workspace }}/.verity-ensemble-cache
        run: uv run ${{ matrix.extras }} pytest

  bindings-python:
    name: bindings-python (PyO3)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/python
          shared-key: bindings-python
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: pytest
        run: uv run --with pytest pytest tests

  web:
    name: web (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/web/pnpm-lock.yaml
      - name: install
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm typecheck
