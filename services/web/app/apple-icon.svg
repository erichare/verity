<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Verity">
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9a063"/>
      <stop offset="0.5" stop-color="#a9803e"/>
      <stop offset="1" stop-color="#8a6630"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed navy seal field (iOS applies its own rounding) -->
  <rect x="0" y="0" width="512" height="512" fill="#0e2a47"/>

  <!-- Brass double ring (the seal) -->
  <circle cx="256" cy="256" r="186" fill="none" stroke="url(#brass)" stroke-width="10"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#brass)" stroke-width="3" stroke-opacity="0.8"/>

  <!-- Converging striae "V": parallel marks resolving to one vertex -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 176 168 L 256 330 L 336 168" stroke="#e8e2d4" stroke-opacity="0.28" stroke-width="10"/>
    <path d="M 200 168 L 256 312 L 312 168" stroke="#e8e2d4" stroke-opacity="0.5" stroke-width="12"/>
    <path d="M 224 168 L 256 296 L 288 168" stroke="url(#brass)" stroke-width="22"/>
  </g>

  <!-- Brass node at the vertex: the point of agreement -->
  <circle cx="256" cy="300" r="15" fill="#c9a063"/>
  <circle cx="256" cy="300" r="15" fill="none" stroke="#0e2a47" stroke-width="3"/>
</svg>
