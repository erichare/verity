[project]
name = "verity-catalog"
version = "0.1.0"
description = "Verity data catalog — normalized catalog + content-addressed store + REST API for forensic X3P scans."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT OR Apache-2.0" }
authors = [{ name = "Eric Hare", email = "ericrhare@gmail.com" }]
dependencies = [
    "sqlmodel>=0.0.22",
    "pydantic-settings>=2.4",
    "alembic>=1.13",
    "typer>=0.12",
]

[project.optional-dependencies]
# Ingestion needs to read X3P (verity-x3p) and fetch from the web.
ingest = ["verity-x3p", "httpx>=0.27", "pyyaml>=6"]
dev = ["pytest>=8", "ruff>=0.6"]

[project.scripts]
verity-catalog = "verity_catalog.cli:main"

# Dev-time source for the locally-built X3P binding (until it's on PyPI).
[tool.uv.sources]
verity-x3p = { path = "../../bindings/python" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verity_catalog"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["alembic/versions"]  # autogenerated migrations

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# Typer requires the call in the default (the idiomatic pattern).
extend-immutable-calls = ["typer.Argument", "typer.Option"]

[tool.pytest.ini_options]
testpaths = ["tests"]
