[project]
name = "verity-catalog"
version = "0.1.0"
description = "Verity data catalog — normalized catalog + content-addressed store + REST API for forensic X3P scans."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT OR Apache-2.0" }
authors = [{ name = "Eric Hare", email = "ericrhare@gmail.com" }]
dependencies = [
    "sqlmodel>=0.0.22",
    "pydantic-settings>=2.4",
    "alembic>=1.13",
    "typer>=0.12",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.6"]

[project.scripts]
verity-catalog = "verity_catalog.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verity_catalog"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["alembic/versions"]  # autogenerated migrations

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
