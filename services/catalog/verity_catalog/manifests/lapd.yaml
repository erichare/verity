# LAPD casework bullets — NBTRD study cc566e9f-63f9-4321-8cb5-f55db03d4475.
#
# The catalog's largest set by far: 15,027 NBTRD scans across 625 nominal source
# barrels (Barrel1..625, ~4 bullets x 6 lands each), labeled in the NBTRD
# Barrel{N}_Bullet{M}_Land{L} scheme. Its role here is a SELF-SUPERVISED
# PRETRAINING corpus for the learned representation (Stage-A MAE / contrastive),
# which is data-blocked at the ~200 labeled scans/study of the proof datasets —
# the lever is more unlabeled surface, and this is it. Every scan carries a
# nominal known-barrel label, so it can double as held-out KM/KNM evaluation.
# Crawled with `verity-catalog crawl-study` (no questioned/Unk buckets present).
# NOT ingested by default (15k x ~3 MB ~= 45 GB on disk) — ingest on demand.
